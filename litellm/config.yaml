model_list:
  # Primary extraction model — Claude Sonnet 4 with vision
  - model_name: tabula-extract
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096

  # Fallback text-only model for redacted text extraction
  - model_name: tabula-extract-text
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

litellm_settings:
  # Log every request/response to the DB — audit trail for compliance
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true
  set_verbose: false
  request_timeout: 120
  # Defense-in-depth: strip common PII patterns from any text content
  # that slips through our local redactor before it hits the provider
  redact_messages_in_exceptions: true
  redact_user_api_key_info: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Keep logs indefinitely for audit. Adjust per retention policy.
  disable_spend_logs: false
  store_model_in_db: false

# Guardrails: text-based PII masking via Presidio.
# Runs on request messages AND response text as belt-and-suspenders
# for the local visual redaction we do before this proxy sees anything.
guardrails:
  - guardrail_name: "presidio-pii-mask"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      # Entities to detect and mask. Dollar amounts intentionally
      # excluded — they are the payload we want to extract.
      pii_entities_config:
        US_SSN: "MASK"
        CREDIT_CARD: "MASK"
        US_BANK_NUMBER: "MASK"
        PHONE_NUMBER: "MASK"
        EMAIL_ADDRESS: "MASK"
        DATE_TIME: "NO_ACTION"
        PERSON: "NO_ACTION"
        LOCATION: "NO_ACTION"
        US_DRIVER_LICENSE: "MASK"
        US_PASSPORT: "MASK"
        US_ITIN: "MASK"
